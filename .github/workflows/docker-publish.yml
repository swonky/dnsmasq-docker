name: Docker

on:
  schedule:
    - cron: "40 7 * * *"
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with docker-bake
        run: |
          docker buildx bake \
            --file docker-bake.hcl \
            --set dnsmasq.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/dnsmasq:${VERSION},${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/dnsmasq:latest \
            --set dnsmasq-minimal.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/dnsmasq:${VERSION}-minimal,${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/dnsmasq:minimal \
            $([[ "${{ github.event_name }}" != "pull_request" ]] && echo "--push")

      - name: Sign images
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/dnsmasq:latest
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/dnsmasq:minimal
